<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mariah Cartomante | Links</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Montserrat:wght@400;600;700&family=Pacifico&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="links-page">
    <section class="hero">
      <img class="hero__avatar" src="../imagens/foto-perfil-Marcia.jpg" alt="Mariah Cartomante">
      <p class="hero__eyebrow">Links exclusivos</p>
      <h1>Mariah Cartomante</h1>
      <p class="hero__text">Escolha abaixo o canal que deseja acessar.</p>
    </section>

    <section class="links-list">
      <a
        class="link-card link-card--whatsapp"
        href="https://wa.me/5521990669549"
        target="_blank"
        rel="noopener noreferrer"
      >
        <div class="link-card__content">
          <p class="link-card__label">Atendimento direto</p>
          <h2>WhatsApp</h2>
          <span class="link-card__button">Entrar agora</span>
        </div>
        <div class="link-card__art" aria-hidden="true">
          <img src="../imagens/whatsapp.jpg" alt="">
        </div>
      </a>

      <a
        class="link-card link-card--cursos"
        href="../index.html#cursos"
        target="_blank"
        rel="noopener noreferrer"
      >
        <div class="link-card__content">
          <p class="link-card__label">Conteudo e formacao</p>
          <h2>Cursos</h2>
          <span class="link-card__button">Ver cursos</span>
        </div>
        <div class="link-card__art" aria-hidden="true">
          <img src="../imagens/cursos.jpeg" alt="">
        </div>
      </a>

      <a
        class="link-card"
        href="https://www.google.com"
        target="_blank"
        rel="noopener noreferrer"
      >
        <div class="link-card__content">
          <p class="link-card__label">Acesse o site</p>
          <h2>Site</h2>
          <span class="link-card__button">Abrir site</span>
        </div>
        <div class="link-card__art" aria-hidden="true">
          <img src="../imagens/site.jpg" alt="">
        </div>
      </a>
    </section>
  </main>
</body>
</html>
