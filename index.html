<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mariah Cartomante</title>
    <link rel="shortcut icon" type="imagex/png" href="./imagens/logo.png">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="main.css">
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="navbar navbar-expand-lg sticky-top p-4" id="cabecalho">
        <div class="container">
            <h1 class="navbar-brand m-0 section-title">Mariah Cartomante</h1>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu-navegacao">
                <span class="navbar-toggler-icon"></span>
            </button>
            <nav class="navbar-collapse collapse justify-content-end" id="menu-navegacao">
                <ul class="nav nav-pills">
                    <li class="nav-item"><a href="#sobre" class="nav-link">Sobre</a></li>
                    <li class="nav-item"><a href="#servicos" class="nav-link">Serviços</a></li>
                    <li class="nav-item">
                        <a class="nav-link fw-bold" href="#" data-bs-toggle="modal" data-bs-target="#modalCarrinho">
                            <i class="bi bi-cart3"></i> Carrinho <span id="contador-carrinho">(0)</span>
                        </a>
                    </li>
                </ul>
            </nav>
        </div>
    </header>

    <main data-bs-spy="scroll" data-bs-target="#cabecalho">
        <section id="sobre" class="pt-5 pb-5">
            <div class="container">
                <div class="row align-items-center">
                    <div class="col-md-5">
                        <img src="./imagens/foto-perfil-Marcia.jpg" class="d-block w-100 rounded shadow" alt="Mariah">
                    </div>
                    <div class="col-md-7">
                        <h2 class="section-title text-colored">Sobre Mariah Cartomante</h2>
                        <p>Clareza e orientação através do Baralho Cigano e Terapias Radiónicas.</p>
                    </div>
                </div>
            </div>
        </section>

        <section id="servicos" class="pt-5 pb-5 bg-light">
            <div class="container">
                <h2 class="section-title text-center text-colored mb-5">Nossos Serviços</h2>
                <div class="row">
                    <aside class="col-md-3">
                        <nav class="nav nav-pills flex-column nav-servico">
                            <button data-bs-toggle="tab" data-bs-target="#tab-baralhos" class="nav-link active">Baralhos</button>
                            <button data-bs-toggle="tab" data-bs-target="#tab-rituais" class="nav-link">Rituais</button>
                            <button data-bs-toggle="tab" data-bs-target="#tab-mesas" class="nav-link">Mesas Radiónicas</button>
                        </nav>
                    </aside>
                    <div class="col-md-9">
                        <div class="tab-content">
                            <div class="tab-pane active" id="tab-baralhos"><div class="row" id="container-baralhos"></div></div>
                            <div class="tab-pane" id="tab-rituais"><div class="row" id="container-rituais"></div></div>
                            <div class="tab-pane" id="tab-mesas"><div class="row" id="container-mesas"></div></div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <div class="modal fade" id="modalCarrinho" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Seu Carrinho</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <ul id="lista-carrinho" class="list-group mb-3"></ul>
                    <p class="fw-bold text-end" id="total-carrinho">Total: R$ 0,00</p>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-success w-100" onclick="finalizarCompra()">Finalizar e Pagar</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
